{% extends 'base.html' %}

{% block title %}Add Terms - {{ quiz_name }}{% endblock %}

{% block content %}
    <section class="quiz-header">
        <div>
            <h2>Add Terms to {{ quiz_name }}</h2>
            <p>Enter a term and its definition, then keep adding until your quiz is ready.</p>
        </div>
        <a class="button" href="{{ url_for('folder', folder_name=folder_name) }}">Back to folder</a>
    </section>

    <form action="{{ url_for('add_terms') }}" method="post">
        <div class="form-field">
            <label for="term">Term</label>
            <input id="term" type="text" name="term" placeholder="Term" required>
        </div>
        <div class="form-field">
            <label for="definition">Definition</label>
            <input id="definition" type="text" name="definition" placeholder="Definition" required>
        </div>
        <button type="submit" class="button">Add Term</button>
    </form>

    <p style="margin-top: 24px;"><a class="button" href="{{ url_for('finish_adding_terms') }}">Finish Adding Terms</a></p>
{% endblock %}
