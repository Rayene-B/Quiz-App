{% extends 'base.html' %}

{% block title %}Question {{ current }} of {{ total }}{% endblock %}

{% block content %}
    <section class="quiz-header">
        <div>
            <h2>Question {{ current }} of {{ total }}</h2>
            <p>Select the correct definition for the term below.</p>
        </div>
    </section>

    <div class="card" style="margin-bottom: 24px;">
        <strong>{{ question.term }}</strong>
    </div>

    <form action="{{ url_for('quiz_question') }}" method="post">
        <div class="options-list">
            {% for option in question.options %}
                <label class="option-choice">
                    <input type="radio" name="option" value="{{ option }}" required>
                    <span>{{ option }}</span>
                </label>
            {% endfor %}
        </div>
        <button type="submit" class="button" style="margin-top: 18px;">Submit Answer</button>
    </form>
{% endblock %}
