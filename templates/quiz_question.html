<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Question {{ current }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin: 20px 0; }
        input { margin: 5px; }
    </style>
</head>
<body>
    <h1>Question {{ current }} of {{ total }}</h1>
    <p><strong>{{ question.term }}</strong></p>
    <form action="{{ url_for('quiz_question') }}" method="post">
        {% for option in question.options %}
            <input type="radio" name="option" value="{{ option }}" required> {{ option }}<br>
        {% endfor %}
        <button type="submit">Submit</button>
    </form>
</body>
</html>
